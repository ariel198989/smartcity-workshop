    // RTL flip + softer scrim (engine injects its CSS at mount; this style

    const rtl = document.createElement('style');
    rtl.textContent = `
      .sw-copylayer::before{left:auto;right:0;width:min(46vw,640px);
        background:linear-gradient(270deg,var(--sw-bg) 0%,
          color-mix(in srgb,var(--sw-bg) 62%,transparent) 30%,
          color-mix(in srgb,var(--sw-bg) 24%,transparent) 62%,transparent 100%);}
      .sw-copy{left:auto;right:clamp(18px,5vw,64px);text-align:right;}
      .sw-route{right:auto;left:clamp(14px,2.4vw,30px);}
      @media (max-width:860px){
        .sw-copy{left:clamp(18px,5vw,64px);right:clamp(18px,5vw,64px);text-align:right;}
