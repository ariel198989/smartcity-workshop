<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Smart City — המסע של תמונה אחת</title>
  <meta name="description" content="גללו — ותעופו דרך המסלול שתמונה אחת של ילד עוברת: מרחוב עם בור, דרך מוח ה-AI והענן, אל מפת העירייה — וחזרה לרחוב מתוקן." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root, .sw-root {
      --sw-bg: #020509;
      --sw-ink: #EAF4FF;
      --sw-ink-soft: #8fa6bd;
      --sw-accent: #35E1FF;
      --sw-font-display: 'Rubik', sans-serif;
      --sw-font-body: 'Rubik', sans-serif;
    }
    html { background: #020509; }
  </style>
</head>
<body>
  <div id="top"></div>
  <div id="world"></div>

  <script src="scrub-engine.js"></script>
  <script>
    mountScrollWorld(document.getElementById('world'), {
      brand: { name: 'SMART CITY', href: '#top' },
      cta: { label: 'כניסה לאפליקציה ←', href: 'https://smart-city-cyan.vercel.app' },
      hint: 'גללו כדי להמריא',
      diveScroll: 1.3,
      connScroll: 0.9,
      sections: [
        {
          id: 'street', label: 'הרחוב',
          still: 'still_0_street.webp',
          clip: 'vid/leg_0.mp4', clipMobile: 'vid/leg_0-m.mp4',
          accent: '#FFB627',
          scroll: 1.25, linger: 0.25,
          eyebrow: 'סדנת SMART CITY',
          title: 'רואים מפגע?',
          body: 'ילד, טלפון ורחוב אחד — ככה זה מתחיל. צילום אחד של בור בכביש נכנס למערכת.',
          tags: ['מצלמים', 'בלי התקנה'],
        },
        {
          id: 'hud', label: 'האימון',
          still: 'still_1_hud.webp',
          clip: 'vid/leg_1.mp4', clipMobile: 'vid/leg_1-m.mp4',
          accent: '#35E1FF',
          scroll: 1.15, linger: 0.2,
          eyebrow: 'מה זה בעצם AI',
          title: 'ככה נראה אימון',
          body: 'כל תמונה שהילדים מתייגים מלמדת את המודל לראות. דאטה טוב = מודל חכם.',
          tags: ['תיוג', 'ראייה ממוחשבת'],
        },
        {
          id: 'cloud', label: 'הענן',
          still: 'still_2_cloud.webp',
          clip: 'vid/leg_2.mp4', clipMobile: 'vid/leg_2-m.mp4',
          accent: '#35E1FF',
          scroll: 1.15, linger: 0.2,
          eyebrow: 'הכוח של ביחד',
          title: 'הכיתה בונה מוח אחד',
          body: 'הדאטה של כולם עולה לענן, מתאמן — וחוזר כמודל אחד לכל טלפון בעיר.',
          tags: ['אימון בענן', 'YOLO'],
        },
        {
          id: 'map', label: 'מפת העיר',
          still: 'still_3_map.webp',
          clip: 'vid/leg_3.mp4', clipMobile: 'vid/leg_3-m.mp4',
          accent: '#FFB627',
          scroll: 1.25, linger: 0.25,
          eyebrow: 'הדשבורד של העירייה',
          title: 'העירייה רואה הכל',
          body: 'כל נעץ הוא מפגע אמיתי עם מיקום GPS מדויק — סוג, תמונה וחומרה. דוח מסודר בלחיצה.',
          tags: ['מפה חיה', 'GPS מדויק'],
        },
        {
          id: 'fixed', label: 'המעגל נסגר',
          still: 'still_4_fixed.webp',
          clip: 'vid/leg_4.mp4', clipMobile: 'vid/leg_4-m.mp4',
          accent: '#4ade80',
          scroll: 1.6, linger: 0.45,
          eyebrow: 'הערך האמיתי',
          title: 'הבור שצילמת — תוקן.',
          body: 'מהצילום של ילד אחד ועד רחוב מתוקן. זו לא סימולציה — זו המערכת שהכיתה שלכם תבנה.',
          tags: ['אימות בשטח', 'עיר חכמה'],
          cta: {
            primary: { label: 'מתחילים — כניסה לאפליקציה', href: 'https://smart-city-cyan.vercel.app' },
            secondary: { label: 'לתיאום סדנה בוואטסאפ', href: 'https://wa.me/972507594477?text=%D7%94%D7%99%D7%99%20%D7%9C%D7%99%D7%93%D7%95%D7%A8%2C%20%D7%A8%D7%90%D7%99%D7%AA%D7%99%20%D7%90%D7%AA%20%D7%94%D7%A2%D7%95%D7%9C%D7%9D%20%D7%94%D7%A0%D7%92%D7%9C%D7%9C%20%D7%A9%D7%9C%20Smart%20City%20%D7%95%D7%90%D7%A9%D7%9E%D7%97%20%D7%9C%D7%A9%D7%9E%D7%95%D7%A2%20%D7%A4%D7%A8%D7%98%D7%99%D7%9D' },
          },
        },
      ],
      connectors: [],
    });
    // RTL flip + softer scrim (engine injects its CSS at mount; this style
    // element comes after it in DOM order, so equal-specificity rules win)
    const rtl = document.createElement('style');
    rtl.textContent = `
      .sw-copylayer::before{left:auto;right:0;width:min(46vw,640px);
        background:linear-gradient(270deg,var(--sw-bg) 0%,
          color-mix(in srgb,var(--sw-bg) 62%,transparent) 30%,
          color-mix(in srgb,var(--sw-bg) 24%,transparent) 62%,transparent 100%);}
      .sw-copy{left:auto;right:clamp(18px,5vw,64px);text-align:right;}
      .sw-route{right:auto;left:clamp(14px,2.4vw,30px);}
      @media (max-width:860px){
        .sw-copy{left:clamp(18px,5vw,64px);right:clamp(18px,5vw,64px);text-align:right;}
        .sw-route{left:6px;right:auto;}
      }
      /* ── chrome, professionalized: HUD language — sharp corners, hairlines,
         one gold CTA. The engine's defaults (light pills, gradient blob mark,
         accent-following logo) read amateur on the dark world. ── */
      .sw-brand__mark{display:none;}
      .sw-brand__name{font-family:'Space Grotesk',monospace;font-weight:700;
        letter-spacing:.26em;font-size:.92rem;color:#EAF4FF;}
      .sw-brand__name b{color:#35E1FF;font-weight:700;}
      .sw-topcta{background:#FFB627;color:#241500;border-radius:0;
        padding:12px 28px;font-weight:700;font-size:.9rem;
        box-shadow:0 0 0 1px rgba(255,182,39,.3),0 6px 22px rgba(255,182,39,.22);
        transition:transform .15s,box-shadow .15s;}
      .sw-topcta:hover{transform:translateY(-1px);
        box-shadow:0 0 0 1px rgba(255,182,39,.5),0 10px 30px rgba(255,182,39,.38);}
      .sw-nav{background:rgba(3,10,21,.72);border:1px solid rgba(53,225,255,.16);
        border-radius:0;padding:4px;backdrop-filter:blur(10px);}
      .sw-nav__item{border-radius:0;color:#8fa6bd;font-size:.8rem;}
      .sw-nav__item:hover{color:#EAF4FF;background:transparent;}
      .sw-nav__item.is-active{background:transparent;color:#EAF4FF;
        box-shadow:inset 0 -2px 0 var(--sw-accent);}
      .sw-btn{border-radius:0;font-weight:700;}
      .sw-btn--primary{background:#FFB627;color:#241500;
        box-shadow:0 0 0 1px rgba(255,182,39,.3),0 8px 26px rgba(255,182,39,.26);}
      .sw-btn--primary:hover{box-shadow:0 0 0 1px rgba(255,182,39,.5),0 12px 32px rgba(255,182,39,.4);}
      .sw-btn--ghost{color:#EAF4FF;border:1px solid rgba(53,225,255,.35);}
      .sw-btn--ghost:hover{border-color:#35E1FF;color:#35E1FF;}`;
    document.body.appendChild(rtl);
    // two-tone fixed wordmark (never follows the section accent)
    const bn = document.querySelector('.sw-brand__name');
    if (bn) bn.innerHTML = 'SMART <b>CITY</b>';
  </script>
</body>
</html>
